<!doctype html>
<html lang="ja" data-theme="current">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>パスノート</title>
  <link rel="icon" href="docs/path-note-icon.svg" type="image/svg+xml">

  <!-- 開発・配布を簡単にするため CDN 版 Tailwind を利用 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        fontSize: {
          xxs: "10px",
          xs: "11px",
          sm: "12px",
          base: "13px",
          md: "14px",
          lg: "16px",
          xl: "20px",
          "2xl": "24px",
          "3xl": "30px",
          "4xl": "36px",
          "5xl": "48px",
          "6xl": "60px",
          "7xl": "72px",
          "8xl": "96px",
          "9xl": "128px"
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root,
    [data-theme="current"] {
      --bg-base: #0f172a;
      --bg-layer: #111827;
      --bg-sidebar: #0f172a;
      --bg-control: #0b1220;
      --bg-hover: rgba(255, 255, 255, 0.05);
      --border: #1f2937;
      --accent: #7c3aed;
      --accent-hover: #8b5cf6;
      --accent-soft: rgba(124, 58, 237, 0.12);
      --accent-soft-strong: rgba(124, 58, 237, 0.15);
      --text-heading: #e5e7eb;
      --text-body: #cbd5e1;
      --text-muted: #9ca3af;
      --text-on-accent: #ffffff;
      --card-radius: 0.75rem;
      --card-shadow: 0 8px 24px -12px rgba(0, 0, 0, 0.8);
      --path-bg: rgba(15, 23, 42, 0.35);
      --path-border: rgba(124, 58, 237, 0.35);
      --path-radius: 0.5rem;
      --header-weight: 600;
      --dialog-backdrop: rgba(2, 6, 23, 0.78);
    }

    [data-theme="open"],
    [data-theme="compact"] {
      --bg-base: #f4f4f5;
      --bg-layer: #ffffff;
      --bg-sidebar: #efeff1;
      --bg-control: #ffffff;
      --bg-hover: rgba(79, 71, 123, 0.06);
      --border: #d9dade;
      --accent: #4f477b;
      --accent-hover: #3f3866;
      --accent-soft: rgba(79, 71, 123, 0.1);
      --accent-soft-strong: rgba(79, 71, 123, 0.16);
      --text-heading: #202126;
      --text-body: #4b4c52;
      --text-muted: #777980;
      --text-on-accent: #ffffff;
      --card-radius: 0;
      --card-shadow: none;
      --path-bg: transparent;
      --path-border: transparent;
      --path-radius: 0;
      --header-weight: 700;
      --dialog-backdrop: rgba(32, 33, 38, 0.48);
    }

    body {
      font-family: "Noto Sans JP", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-base);
      color: var(--text-body);
    }


    .tab-btn {
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      background-color: transparent;
      padding: 0.4rem 0.9rem;
      border-radius: 0.6rem 0.6rem 0 0;
      font-weight: 600;
      transition: border-color 120ms ease, color 120ms ease;
    }

    .tab-btn:hover {
      border-bottom-color: var(--border);
      color: var(--text-heading);
    }

    .tab-btn.active {
      border-bottom-color: var(--accent);
      color: var(--text-heading);
    }

    .cat-btn {
      background-color: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      transition: background-color 140ms ease, color 140ms ease;
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cat-btn:hover {
      background-color: var(--bg-hover);
      color: var(--text-heading);
    }

    .cat-btn.active {
      background-color: var(--accent-soft);
      color: var(--text-heading);
      font-weight: 700;
    }

    .cat-line {
      width: 10px;
      height: 3px;
      background-color: var(--cat-color, var(--accent));
      opacity: 0.35;
      transition: width 140ms ease, opacity 140ms ease, height 140ms ease;
    }

    .cat-btn:hover .cat-line {
      width: 18px;
      height: 6px;
      opacity: 0.7;
    }

    .cat-btn.active .cat-line {
      width: 18px;
      height: 6px;
      opacity: 1;
    }

    .list-row {
      background-color: transparent;
      border: 1px solid transparent;
    }

    .list-row:hover {
      background-color: var(--bg-hover);
      border-color: transparent;
    }

    .path-chip {
      display: inline-block;
      max-width: 100%;
      padding: 0.25rem 0.6rem;
      border: 1px solid var(--path-chip-border, var(--path-border));
      border-radius: var(--path-radius);
      background-color: var(--path-bg);
      color: var(--text-body);
      line-height: 1.45;
      white-space: normal;
      word-break: break-all;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease;
    }

    .list-row .path-chip:hover,
    .list-row:hover .path-chip {
      transform: translateY(-1px);
    }

    .item-icon {
      color: var(--item-color, var(--accent));
      transition: color 140ms ease, transform 140ms ease;
    }

    .list-row:hover .item-icon {
      color: var(--item-color-strong, var(--text-heading));
      transform: translateY(-1px) scale(1.12);
    }

    .list-row:hover .item-name {
      color: var(--text-heading);
      transform: translateY(-1px);
    }

    .list-row:hover .path-chip {
      transform: translateY(-1px);
    }

    .row-accent {
      background: var(--accent);
    }

    .note-badge {
      color: var(--text-muted);
    }

    .cat-card {
      background-color: var(--bg-layer);
      border-color: var(--border);
      border-radius: var(--card-radius) !important;
      box-shadow: var(--card-shadow), 0 0 0 1px var(--cat-glow, transparent) !important;
    }

    .cat-card__header {
      background-color: var(--cat-header-bg, transparent);
      border-color: var(--cat-header-border, var(--border));
    }

    .cat-card__topline {
      background-color: var(--cat-line, transparent);
    }

    .cat-card__pill,
    .subcat-line {
      background-color: var(--cat-color, var(--accent));
    }

    .subcat-line {
      display: inline-block;
      height: 4px;
      width: 12px;
      border-radius: 999px;
      opacity: 0.65;
      transition: width 160ms ease, opacity 160ms ease, height 160ms ease;
    }

    .subcat-toggle[aria-expanded="true"] .subcat-line {
      width: 12px;
      height: 4px;
      opacity: 0.8;
    }

    .subcat-toggle[aria-expanded="false"] .subcat-line {
      width: 6px;
      height: 6px;
      opacity: 0.35;
    }

    .subcat-list {
      border-color: var(--subcat-border, var(--border));
    }

    .subcat-toggle {
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
    }

    .subcat-toggle:hover {
      background-color: var(--bg-hover);
      transform: translateY(-1px);
    }

    .add-inline-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      flex: 0 0 auto;
      border: 1px solid transparent;
      border-radius: 0.45rem;
      color: var(--text-muted);
      font-size: 1.1rem;
      line-height: 1;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .add-inline-btn:hover,
    .add-inline-btn:focus-visible {
      border-color: var(--accent);
      background-color: var(--accent-soft);
      color: var(--text-heading);
      outline: none;
    }

    .add-menu {
      min-width: 240px;
      background-color: var(--bg-layer);
      border: 1px solid var(--border);
    }

    .add-menu-item {
      display: block;
      width: 100%;
      padding: 0.65rem 0.8rem;
      border-radius: 0.4rem;
      color: var(--text-body);
      text-align: left;
    }

    .add-menu-item:hover,
    .add-menu-item:focus-visible {
      background-color: var(--bg-hover);
      color: var(--text-heading);
      outline: none;
    }

    .add-menu-item:disabled {
      cursor: not-allowed;
      opacity: 0.4;
    }

    .context-locked {
      color: var(--text-muted);
      background-color: var(--bg-control);
    }

    dialog::backdrop {
      background: var(--dialog-backdrop);
      backdrop-filter: blur(3px);
    }

    header {
      color: var(--text-body);
    }

    aside {
      background-color: var(--bg-sidebar) !important;
    }

    .brand-name {
      color: var(--text-heading);
    }

    .secondary-button,
    .theme-option,
    .dialog-shell,
    .dialog-input,
    .toast-surface {
      border-color: var(--border) !important;
      color: var(--text-body) !important;
    }

    .secondary-button,
    .dialog-input,
    .toast-surface {
      background-color: var(--bg-control) !important;
    }

    .primary-button {
      border-color: var(--accent) !important;
      background-color: var(--accent) !important;
      color: var(--text-on-accent) !important;
    }

    .primary-button:hover {
      background-color: var(--accent-hover) !important;
    }

    .dialog-shell {
      background-color: var(--bg-layer) !important;
      color: var(--text-heading) !important;
    }

    .dialog-divider {
      border-color: var(--border) !important;
    }

    .dialog-label,
    .dialog-muted,
    .menu-hint {
      color: var(--text-muted) !important;
    }

    .note-badge,
    #emptyMessage {
      border-color: var(--border) !important;
      background-color: var(--bg-control) !important;
      color: var(--text-muted) !important;
    }

    .theme-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.5rem 0.8rem;
      border-radius: 0.4rem;
      text-align: left;
    }

    .theme-option:hover,
    .theme-option:focus-visible,
    .theme-option.active {
      background-color: var(--bg-hover);
      color: var(--text-heading) !important;
      outline: none;
    }

    .theme-option.active::after {
      content: "選択中";
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 700;
    }

    [data-theme="open"] .cat-card {
      margin-bottom: 2.25rem;
      border: 0;
      background: transparent;
      overflow: visible;
      box-shadow: none !important;
    }

    [data-theme="open"] .cat-card__header {
      padding: 0.2rem 0 0.75rem;
      background: transparent !important;
      border-bottom: 2px solid var(--text-heading);
      grid-template-columns: 1fr auto;
    }

    [data-theme="open"] .cat-card__header .cat-card__pill,
    [data-theme="open"] .cat-card__topline {
      display: none;
    }

    [data-theme="open"] .cat-card__header > div {
      font-size: 1.5rem;
      font-weight: 800;
    }

    [data-theme="open"] .cat-card > div:last-child {
      padding: 0.85rem 0 0;
    }

    [data-theme="open"] .subcat-toggle {
      padding-left: 0;
      border-radius: 0;
    }

    [data-theme="open"] .subcat-list {
      margin-left: 0;
      padding-left: 0;
      border-left: 0;
    }

    [data-theme="open"] .list-row {
      border-color: transparent;
      border-radius: 0;
      padding-top: 0.35rem;
      padding-bottom: 0.35rem;
    }

    [data-theme="open"] .path-chip {
      padding-left: 0;
      padding-right: 0;
      border-color: transparent;
      color: #85838d;
    }

    [data-theme="open"] .cat-card__pill,
    [data-theme="open"] .subcat-line {
      background-color: #8176bb;
    }

    [data-theme="open"] .item-icon {
      color: #a09cac;
    }

    [data-theme="open"] .list-row:hover {
      background-color: rgba(79, 71, 123, 0.045);
    }

    [data-theme="open"] .list-row:hover .item-icon {
      color: #8176bb;
    }

    [data-theme="open"] #list {
      gap: 0;
    }

    .compact-list {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 0.65rem;
      background: var(--bg-layer);
    }

    .compact-head,
    .compact-row {
      display: grid;
      grid-template-columns: 78px 110px 220px minmax(0, 1fr) 24px;
      align-items: center;
      gap: 0.5rem;
    }

    .compact-head {
      min-height: 1.8rem;
      padding: 0 0.7rem;
      background: #ededf0;
      color: var(--text-muted);
      font-size: 0.65rem;
      font-weight: 700;
    }

    .compact-row {
      min-height: 2rem;
      padding: 0 0.7rem;
      border-top: 1px solid #eeeeef;
      cursor: pointer;
    }

    .compact-row:hover {
      background: var(--accent-soft);
      box-shadow: inset 3px 0 var(--accent);
    }

    .compact-tag {
      overflow: hidden;
      padding: 0.2rem 0.4rem;
      border-radius: 0.3rem;
      background: #f1f1f3;
      color: var(--text-muted);
      font-size: 0.65rem;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .compact-tag--category {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }

    .compact-name {
      overflow: hidden;
      color: var(--text-heading);
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .compact-path {
      overflow: hidden;
      color: var(--text-muted);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.68rem;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .compact-note {
      color: var(--text-muted);
      font-size: 0.65rem;
      text-align: center;
    }

  </style>
</head>

<body>
  <div class="h-dvh flex flex-col overflow-hidden">

    <header class="sticky top-0 z-30 border-b backdrop-blur px-5 py-2"
      style="background-color: var(--bg-layer); border-color: var(--border);">
      <div class="grid grid-cols-[260px_1fr_auto] items-end gap-3">
        <div class="flex items-center gap-2.5" style="color: var(--text-heading);">
          <img src="docs/path-note-icon.svg" alt="" class="h-9 w-9 rounded-lg">
          <span class="brand-name text-xl font-bold tracking-tight">パスノート</span>
        </div>
        <div id="tabNav" class="flex flex-wrap items-end gap-1.5 pt-1 pb-1 -mb-[1px]"></div>
        <div class="relative flex items-center gap-2 pb-1">
          <button id="openViewMenuButton" type="button" aria-expanded="false" aria-controls="viewMenu"
            class="secondary-button rounded-md border px-3 py-1.5 text-sm font-semibold">
            表示
          </button>
          <div id="viewMenu" class="add-menu absolute right-[174px] top-full z-40 mt-2 hidden rounded-lg p-1.5 shadow-2xl">
            <div class="px-3 pb-1 text-xs font-semibold" style="color: var(--text-muted);">表示モード</div>
            <button type="button" class="theme-option" data-theme-value="current">スタンダード</button>
            <button type="button" class="theme-option" data-theme-value="open">オープン</button>
            <button type="button" class="theme-option" data-theme-value="compact">コンパクト</button>
          </div>
          <button id="openDataMenuButton" type="button" aria-expanded="false" aria-controls="dataMenu"
            class="secondary-button rounded-md border px-3 py-1.5 text-sm font-semibold">
            データ管理
          </button>
          <div id="dataMenu" class="add-menu absolute right-[76px] top-full z-40 mt-2 hidden rounded-lg p-1.5 shadow-2xl">
            <button type="button" class="add-menu-item" data-data-action="import">
              <span class="block font-semibold">データを読み込む</span>
              <span class="menu-hint block text-xs">data.jsから現在の内容を置き換え</span>
            </button>
            <button type="button" class="add-menu-item" data-data-action="export">
              <span class="block font-semibold">データを書き出す</span>
              <span class="menu-hint block text-xs">そのまま使えるdata.jsを保存</span>
            </button>
          </div>
          <input id="importDataInput" type="file" accept=".js,text/javascript" class="hidden">
          <button id="openAddMenuButton" type="button" aria-expanded="false" aria-controls="addMenu"
            class="primary-button rounded-md border px-3 py-1.5 text-sm font-semibold">
            ＋ 追加
          </button>
          <div id="addMenu" class="add-menu absolute right-0 top-full z-40 mt-2 hidden rounded-lg p-1.5 shadow-2xl">
            <button type="button" class="add-menu-item" data-add-action="path">
              <span class="block font-semibold">パスを一から追加</span>
              <span class="menu-hint block text-xs">追加先を入力して登録</span>
            </button>
            <button type="button" class="add-menu-item" data-add-action="category">
              <span class="block font-semibold">カテゴリを追加</span>
              <span id="addCategoryMenuHint" class="block text-xs text-slate-400"></span>
            </button>
            <button type="button" class="add-menu-item" data-add-action="tab">
              <span class="block font-semibold">タブを追加</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-[260px_1fr] flex-1 min-h-0 overflow-hidden">

      <!-- Sidebar -->
      <aside class="border-r overflow-y-auto" style="background-color: var(--bg-base); border-color: var(--border);">
        <div class="p-4">
          <div class="flex items-center justify-between">
            <h2 class="text-base font-semibold" style="color: var(--text-heading);">カテゴリ</h2>
          </div>

          <nav class="mt-2 space-y-0" id="catList"></nav>

          <div class="mt-4 text-sm" style="color: var(--text-muted);">
            <p>操作:</p>
            <ul class="list-disc ml-4 mt-1 space-y-1">
              <li>一覧のパスをクリックでコピー</li>
              <li>キー: ←/→ タブ、↑/↓ カテゴリ</li>
            </ul>
          </div>

          <div id="warningPanel" class="mt-4 hidden"></div>
        </div>
      </aside>

      <!-- Main -->
      <main class="p-5 space-y-4 overflow-y-auto" style="background-color: var(--bg-base);">
        <section id="list" class="grid grid-cols-1 gap-4"></section>

        <section id="empty" class="hidden mt-10">
          <div id="emptyMessage" class="rounded-2xl border border-dashed border-slate-800 bg-slate-900 p-10 text-center"
            style="color: var(--text-muted);">
            条件に一致するデータがありません
          </div>
        </section>
      </main>
    </div>
  </div>

  <dialog id="addPathDialog"
    class="dialog-shell w-[min(560px,calc(100vw-2rem))] rounded-xl border p-0 shadow-2xl">
    <form id="addPathForm" method="dialog">
      <div class="dialog-divider border-b px-5 py-4">
        <h2 class="text-lg font-semibold">パスを追加</h2>
        <p class="dialog-muted mt-1 text-sm">既存または新しい分類を入力して、ブラウザに保存します。</p>
      </div>
      <div class="grid grid-cols-1 gap-4 px-5 py-4 sm:grid-cols-2">
        <label class="dialog-label text-sm">
          タブ
          <input id="addTab" name="tab" list="tabOptions" required
            class="dialog-input mt-1 w-full rounded-md border px-3 py-2 outline-none">
        </label>
        <label class="dialog-label text-sm">
          カテゴリ
          <input id="addCategory" name="category" list="categoryOptions" required
            class="dialog-input mt-1 w-full rounded-md border px-3 py-2 outline-none">
        </label>
        <label class="dialog-label text-sm sm:col-span-2">
          サブカテゴリ
          <input id="addSubCategory" name="subCategory" list="subCategoryOptions" required
            class="dialog-input mt-1 w-full rounded-md border px-3 py-2 outline-none">
        </label>
        <label class="dialog-label text-sm sm:col-span-2">
          表示名
          <input id="addName" name="name" required
            class="dialog-input mt-1 w-full rounded-md border px-3 py-2 outline-none">
        </label>
        <label class="dialog-label text-sm sm:col-span-2">
          パス / URL
          <input id="addPath" name="path" required
            class="dialog-input mt-1 w-full rounded-md border px-3 py-2 font-mono outline-none">
        </label>
        <label class="dialog-label text-sm sm:col-span-2">
          ノート（任意）
          <textarea id="addNote" name="note" rows="2"
            class="dialog-input mt-1 w-full resize-y rounded-md border px-3 py-2 outline-none"></textarea>
        </label>
        <p id="addPathError" class="hidden text-sm text-rose-300 sm:col-span-2"></p>
      </div>
      <div class="dialog-divider flex justify-end gap-2 border-t px-5 py-4">
        <button id="cancelAddPathButton" type="button"
          class="secondary-button rounded-md border px-3 py-2 text-sm font-semibold">
          キャンセル
        </button>
        <button type="submit"
          class="primary-button rounded-md border px-3 py-2 text-sm font-semibold">
          保存
        </button>
      </div>
    </form>
    <datalist id="tabOptions"></datalist>
    <datalist id="categoryOptions"></datalist>
    <datalist id="subCategoryOptions"></datalist>
  </dialog>

  <dialog id="addGroupDialog"
    class="dialog-shell w-[min(440px,calc(100vw-2rem))] rounded-xl border p-0 shadow-2xl">
    <form id="addGroupForm" method="dialog">
      <div class="dialog-divider border-b px-5 py-4">
        <h2 id="addGroupTitle" class="text-lg font-semibold"></h2>
        <p id="addGroupDescription" class="dialog-muted mt-1 text-sm"></p>
      </div>
      <div class="px-5 py-4">
        <label class="dialog-label text-sm">
          名前
          <input id="addGroupName" name="name" required
            class="dialog-input mt-1 w-full rounded-md border px-3 py-2 outline-none">
        </label>
        <p id="addGroupError" class="mt-3 hidden text-sm text-rose-300"></p>
      </div>
      <div class="dialog-divider flex justify-end gap-2 border-t px-5 py-4">
        <button id="cancelAddGroupButton" type="button"
          class="secondary-button rounded-md border px-3 py-2 text-sm font-semibold">
          キャンセル
        </button>
        <button type="submit"
          class="primary-button rounded-md border px-3 py-2 text-sm font-semibold">
          追加
        </button>
      </div>
    </form>
  </dialog>

  <script src="data.js"></script>

  <script>
    (() => {
      // 基本ユーティリティ（DOM取得・文字列安全化）
      const $ = (id) => document.getElementById(id);
      const toSafeString = (value) => (value ?? "").toString();
      const escapeHtml = (str) => str.replace(/[&<>"']/g, (m) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;"
      }[m]));
      // HTML出力用の安全変換
      const toHtml = (value) => escapeHtml(toSafeString(value));
      const dedupe = (arr) => Array.from(new Set(arr));
      // パス種別の判定用アイコン
      const typeIcons = {
        url: `<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 13.5 7 17a4 4 0 1 1-5.7-5.6l4-4a4 4 0 0 1 5.6 0M13.5 10.5 17 7a4 4 0 0 1 5.7 5.6l-4 4a4 4 0 0 1-5.6 0"/><path d="m8 16 8-8"/></svg>`,
        file: `<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h7l5 5v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M14 3v5h5"/></svg>`,
        folder: `<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>`,
        unknown: `<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 9a2.5 2.5 0 1 1 3.9 2 2.5 2.5 0 0 0-1.4 2.2V14"/><path d="M12 18.01l.01-.011"/><rect x="4" y="4" width="16" height="16" rx="3"/></svg>`
      };
      // パス判定用の小関数（テストしやすい粒度）
      const isUrlPath = (value) => /^https?:\/\//i.test(value);
      const isUncPath = (value) => /^\\\\/.test(value);
      const isDrivePath = (value) => /^[a-zA-Z]:\\/.test(value);
      const hasExtension = (value) => /\.[a-z0-9]{1,5}$/i.test(value);
      const hasSeparator = (value) => /[\\\/]/.test(value);
      // パス種別（UNC/ドライブもファイル・フォルダに分類）とアイコン情報
      const classifyPath = (path) => {
        const p = path || "";
        if (isUrlPath(p)) return { type: "url", icon: typeIcons.url };
        const isUnc = isUncPath(p);
        const isDrive = isDrivePath(p);
        const hasExt = hasExtension(p);
        if (isUnc || isDrive) {
          return hasExt
            ? { type: "file", icon: typeIcons.file }
            : { type: "folder", icon: typeIcons.folder };
        }
        if (hasExt) return { type: "file", icon: typeIcons.file };
        if (hasSeparator(p)) return { type: "folder", icon: typeIcons.folder };
        return { type: "unknown", icon: typeIcons.unknown };
      };
      // カテゴリ名から安定した色を生成
      const colorCache = new Map();
      const assignedHues = [];
      const minHueDistance = 7;
      const lightnessRange = { min: 52, max: 68 };
      const hueDistance = (a, b) => {
        const diff = Math.abs(a - b) % 360;
        return Math.min(diff, 360 - diff);
      };
      const isHueFarEnough = (hue) =>
        assignedHues.every((used) => hueDistance(hue, used) >= minHueDistance);
      const pickHue = (seed) => {
        const goldenAngle = 137.508;
        let hue = seed % 360;
        if (isHueFarEnough(hue)) return hue;
        for (let i = 1; i <= 36; i++) {
          const candidate = (seed + goldenAngle * i) % 360;
          if (isHueFarEnough(candidate)) return candidate;
        }
        return hue;
      };
      const colorForCat = (cat) => {
        const keyName = cat || "";
        const cached = colorCache.get(keyName);
        if (cached) return cached;
        const key = keyName.split("").reduce((n, c) => n + c.charCodeAt(0) * 7, 0);
        const hue = pickHue(key);
        assignedHues.push(hue);
        const saturation = 65;
        const lightnessSpan = lightnessRange.max - lightnessRange.min + 1;
        const lightness = lightnessRange.min + (Math.abs(key * 13) % lightnessSpan);
        const base = `hsl(${hue}deg ${saturation}% ${lightness}%)`;
        const alpha = (a) => `hsl(${hue}deg ${saturation}% ${lightness}% / ${a})`;
        const value = { base, alpha };
        colorCache.set(keyName, value);
        return value;
      };

      // タブ未指定時に使うデフォルト名
      const DEFAULT_TAB = "共通";
      const CATALOG_STORAGE_KEY = "pathCatalog.catalog.v1";
      const SUBCAT_STORAGE_KEY = "pathCatalog.subcatCollapsed.v1";
      const THEME_STORAGE_KEY = "pathNote.theme.v1";
      const THEMES = new Set(["current", "open", "compact"]);

      const applyTheme = (theme, { persist = true } = {}) => {
        const legacyThemeMap = { focus: "current", paper: "open", index: "open" };
        const mappedTheme = legacyThemeMap[theme] || theme;
        const safeTheme = THEMES.has(mappedTheme) ? mappedTheme : "current";
        document.documentElement.dataset.theme = safeTheme;
        document.querySelectorAll("[data-theme-value]").forEach((button) => {
          button.classList.toggle("active", button.dataset.themeValue === safeTheme);
        });
        if (persist) {
          try {
            localStorage.setItem(THEME_STORAGE_KEY, safeTheme);
          } catch (e) {
            console.warn("表示モードを保存できませんでした。", e);
          }
        }
      };

      const loadTheme = () => {
        try {
          return localStorage.getItem(THEME_STORAGE_KEY) || "current";
        } catch (e) {
          return "current";
        }
      };
      const subcatKeyFor = (tab, cat, sub) =>
        JSON.stringify([tab || "", cat || "", sub || ""]);
      const loadCollapsedSubcats = () => {
        try {
          const raw = localStorage.getItem(SUBCAT_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return new Set(Array.isArray(parsed) ? parsed : []);
        } catch (e) {
          return new Set();
        }
      };
      const saveCollapsedSubcats = (set) => {
        try {
          localStorage.setItem(SUBCAT_STORAGE_KEY, JSON.stringify(Array.from(set)));
        } catch (e) {
          // ストレージが使えない場合は無視
        }
      };
      const collapsedSubcats = loadCollapsedSubcats();

      // 外部データを安全な形に正規化（空や未定義を文字列化）
      const normalize = (items) => (items || []).map((x, i) => ({
        id: i + 1,
        tab: toSafeString(x.tab || DEFAULT_TAB),
        category: toSafeString(x.category),
        subCategory: toSafeString(x.subCategory),
        name: toSafeString(x.name),
        path: toSafeString(x.path),
        note: toSafeString(x.note)
      }));

      // 階層データをフラット化し、問題点は warnings に収集
      function normalizeCatalog(raw) {
        const warnings = [];
        const items = [];

        const warn = (msg, meta) => warnings.push({ msg, meta });

        if (!Array.isArray(raw)) {
          warn("window.PATH_CATALOG が配列ではありません", { type: typeof raw });
          return { items, warnings };
        }

        for (let t = 0; t < raw.length; t++) {
          const tabBlock = raw[t];
          if (!Array.isArray(tabBlock) || tabBlock.length < 2) {
            warn("タブブロックが不正です", { t, tabBlock });
            continue;
          }
          const tab = String(tabBlock[0] ?? "").trim();
          const categories = tabBlock[1];

          if (!Array.isArray(categories)) {
            warn("カテゴリ配列が不正です", { t, tab });
            continue;
          }

          for (let c = 0; c < categories.length; c++) {
            const catBlock = categories[c];
            if (!Array.isArray(catBlock) || catBlock.length < 2) {
              warn("カテゴリブロックが不正です", { t, c, catBlock });
              continue;
            }
            const category = String(catBlock[0] ?? "").trim();
            const subs = catBlock[1];

            if (!Array.isArray(subs)) {
              warn("サブカテゴリ配列が不正です", { t, tab, c, category });
              continue;
            }

            for (let s = 0; s < subs.length; s++) {
              const subBlock = subs[s];
              if (!Array.isArray(subBlock) || subBlock.length < 2) {
                warn("サブカテゴリブロックが不正です", { t, c, s, subBlock });
                continue;
              }
              const subCategory = String(subBlock[0] ?? "").trim(); // 空OK
              const rows = subBlock[1];

              if (!Array.isArray(rows)) {
                warn("アイテム配列が不正です", { t, tab, c, category, s, subCategory });
                continue;
              }

              for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (!Array.isArray(row)) {
                  warn("アイテム行が配列ではありません", { t, c, s, i, row });
                  continue;
                }

                // 3列固定だが、不足は補完（止めない）
                if (row.length !== 3) {
                  warn("アイテム行の列数が3ではありません（不足は空で補完）", { t, c, s, i, cols: row.length });
                }

                const name = String(row[0] ?? "").trim();
                const path = row[1] ?? "";
                const note = String(row[2] ?? ""); // 空OK

                if (!name) warn("name が空です（表示は継続）", { t, c, s, i });
                if (!path) warn("path が空です（表示は継続）", { t, c, s, i });

                items.push({
                  tab: tab || "未分類",
                  category,
                  subCategory,
                  name,
                  path,
                  note,
                  _meta: { t, c, s, i }
                });
              }
            }
          }
        }

        return { items, warnings };
      };

      const cloneCatalog = (catalog) => JSON.parse(JSON.stringify(catalog));
      const saveCatalog = (catalog) => {
        localStorage.setItem(CATALOG_STORAGE_KEY, JSON.stringify(catalog));
      };
      const loadCatalog = () => {
        const storageWarnings = [];
        try {
          const saved = localStorage.getItem(CATALOG_STORAGE_KEY);
          if (saved !== null) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) return { catalog: parsed, storageWarnings };
            storageWarnings.push({ msg: "保存データが配列ではないため、初期データを使用しました", meta: {} });
          }
        } catch (e) {
          storageWarnings.push({ msg: "保存データを読み込めないため、初期データを使用しました", meta: {} });
        }

        const seed = Array.isArray(window.PATH_CATALOG) ? cloneCatalog(window.PATH_CATALOG) : [];
        try {
          saveCatalog(seed);
        } catch (e) {
          storageWarnings.push({ msg: "ローカルストレージへ初期データを保存できませんでした", meta: {} });
        }
        return { catalog: seed, storageWarnings };
      };

      // 初回は data.js を展開し、以後はローカルストレージを正本にする
      const initialCatalog = loadCatalog();
      let catalog = initialCatalog.catalog;
      let normalizedCatalog = normalizeCatalog(catalog);
      let warnings = initialCatalog.storageWarnings.concat(normalizedCatalog.warnings);

      const getTabBlocks = () => catalog.filter((block) => Array.isArray(block) && block.length >= 2);
      const getTabBlock = (tab) => getTabBlocks().find((block) => toSafeString(block[0]).trim() === tab);
      const getCategoryBlocks = (tab) => {
        const tabBlock = getTabBlock(tab);
        return Array.isArray(tabBlock?.[1])
          ? tabBlock[1].filter((block) => Array.isArray(block) && block.length >= 2)
          : [];
      };
      const getCategoryBlock = (tab, category) =>
        getCategoryBlocks(tab).find((block) => toSafeString(block[0]).trim() === category);
      const getSubCategoryBlocks = (tab, category) => {
        const categoryBlock = getCategoryBlock(tab, category);
        return Array.isArray(categoryBlock?.[1])
          ? categoryBlock[1].filter((block) => Array.isArray(block) && block.length >= 2)
          : [];
      };

      // UIの選択状態
      const state = {
        all: normalize(normalizedCatalog.items),
        tab: "",
        cat: "",
      };
      const initialTabs = dedupe(getTabBlocks().map((block) => toSafeString(block[0]).trim()).filter(Boolean));
      state.tab = initialTabs[0] || "";
      let activeNoteRow = null;

      // 現在の選択状態で絞り込み
      const getFilteredItems = () => state.all.filter(x => {
        if (state.tab && x.tab !== state.tab) return false;
        if (state.cat && x.category !== state.cat) return false;
        return true;
      });

      // 現在のタブに応じたカテゴリ一覧
      const getTabs = () =>
        dedupe(getTabBlocks().map((block) => toSafeString(block[0]).trim()).filter(Boolean));
      const getCats = () =>
        dedupe(getCategoryBlocks(state.tab).map((block) => toSafeString(block[0]).trim()).filter(Boolean));

      // メイン描画用にカテゴリ→サブカテゴリへグルーピング
      const groupByCategory = (items, categories) => {
        const catMap = {};
        categories.forEach((category) => {
          catMap[category] = {};
          getSubCategoryBlocks(state.tab, category).forEach((subBlock) => {
            const subCategory = toSafeString(subBlock[0]).trim();
            if (subCategory) catMap[category][subCategory] = [];
          });
        });
        items.forEach(item => {
          const cat = item.category || "(未設定カテゴリ)";
          const sub = item.subCategory || "(未設定)";
          if (!catMap[cat]) catMap[cat] = {};
          if (!catMap[cat][sub]) catMap[cat][sub] = [];
          catMap[cat][sub].push(item);
        });
        return catMap;
      };

      // タブナビのHTML生成
      const buildTabListHtml = () => {
        const tabs = getTabs();
        const current = state.tab;

        const tabHtml = tabs.map(tab => {
          const isSel = current === tab;
          return `
            <div class="flex items-center">
              <button
                class="tab-btn text-lg ${isSel ? "active" : ""}"
                data-tab="${toHtml(tab)}">
                ${toHtml(tab)}
              </button>
            </div>
          `;
        }).join("");

        return tabHtml;
      };

      const applyTabList = (html) => {
        const holder = $("tabNav");
        if (!holder) return;
        holder.innerHTML = html;
      };

      // タブのナビゲーション描画
      const renderTabList = () => {
        applyTabList(buildTabListHtml());
      };

      // サイドバーカテゴリのHTML生成
      const buildCategoryListHtml = () => {
        const cats = getCats();
        const current = state.cat;

        const allBtn = `
          <button class="w-full text-left rounded-none px-3 py-2 text-md cat-btn ${current === "" ? "active" : ""}"
                  data-cat=""
                  style="--cat-color: var(--accent);">
            <span class="cat-line inline-block rounded-full"></span>
            <span>すべて</span>
          </button>`;

        return allBtn + cats.map(c => {
          const color = colorForCat(c);
          const isSel = current === c;
          return `
            <button class="w-full text-left rounded-none px-3 py-2 text-md cat-btn ${isSel ? "active" : ""}"
                    data-cat="${toHtml(c)}"
                    style="--cat-color: ${color.base};">
              <span class="cat-line inline-block rounded-full mr-2 align-middle"></span>
              <span class="align-middle">${toHtml(c)}</span>
            </button>
          `;
        }).join("");
      };

      const applyCategoryList = (html) => {
        const catList = $("catList");
        if (!catList) return;
        catList.innerHTML = html;
      };

      // サイドバーのカテゴリ描画
      const renderCategoryList = () => {
        applyCategoryList(buildCategoryListHtml());
      };

      // 警告メタ情報の短い表示テキストを作る
      const formatWarningMeta = (meta) => {
        if (!meta) return "";
        const entries = Object.entries(meta);
        if (!entries.length) return "";
        return entries.map(([key, value]) => `${key}:${value}`).join(" ");
      };

      const buildWarningListItem = (warning) => {
        const metaText = formatWarningMeta(warning.meta);
        return `
          <li class="flex flex-col gap-0.5">
            <span>${toHtml(warning.msg)}</span>
            ${metaText ? `<span class="text-rose-300/80 font-mono">${toHtml(metaText)}</span>` : ""}
          </li>
        `;
      };

      // 警告パネルのHTML生成
      const buildWarningListHtml = (warningList) => `
        <div class="rounded-lg border border-rose-900/40 bg-rose-950/25 p-3">
          <div class="flex items-center justify-between text-sm font-semibold text-rose-200">
            <span>警告</span>
            <span class="text-rose-300/80">${warningList.length}件</span>
          </div>
          <ul class="mt-2 space-y-1.5 text-xs text-rose-100/80">
            ${warningList.map(buildWarningListItem).join("")}
          </ul>
        </div>
      `;

      // 警告パネルの描画
      const renderWarnings = (warningList) => {
        const panel = $("warningPanel");
        if (!panel) return;
        if (!warningList.length) {
          panel.classList.add("hidden");
          panel.innerHTML = "";
          return;
        }
        panel.classList.remove("hidden");
        panel.innerHTML = buildWarningListHtml(warningList);
      };

      // 空欄の表示名はプレースホルダで補完
      const formatDisplayName = (name) => (name ? name : "(no name)");
      const buildNoteBadge = (note) => {
        if (!note) return "";
        return `
          <span class="note-badge absolute right-0 top-1/2 -translate-y-1/2 inline-flex h-4 w-4 items-center justify-center rounded-full border border-slate-700 text-xxs bg-slate-900/80">i</span>
        `;
      };

      // 一覧の1行分HTML生成
      const buildListRow = (item) => {
        const meta = classifyPath(item.path);
        const iconHtml = (meta.icon || "").trim();
        const noteText = item.note || "";
        const noteBadge = buildNoteBadge(noteText);
        return `
          <li class="group relative z-0 hover:z-10 cursor-pointer px-0 py-0.5 rounded-md shadow-sm grid grid-cols-[18px_220px_minmax(0,1fr)] gap-x-3 gap-y-0 items-center transition overflow-visible list-row"
              data-copy="${toHtml(item.path)}"
              data-note="${toHtml(noteText)}">
            <div class="row-accent w-0.5 rounded-full opacity-30 group-hover:opacity-90 transition col-span-3"></div>
            <div class="item-icon flex h-4 items-center justify-center text-base leading-none col-start-1 col-span-1 z-10">
              ${iconHtml}
            </div>
            <div class="item-name text-base font-normal leading-snug break-words col-start-2 col-span-1 transition" style="color: var(--text-heading);">
              ${toHtml(formatDisplayName(item.name))}
            </div>
            <div class="relative text-xs font-mono tabular-nums col-start-3 col-span-1 pr-7" style="color: var(--text-muted);">
              <span class="path-chip">${toHtml(item.path)}</span>
              ${noteBadge}
            </div>
          </li>
        `;
      };

      // カテゴリごとのテーマ色をCSS変数に束ねる
      const buildCategoryStyleVars = (color) => {
        const vars = [
          ["--cat-color", color.base],
          ["--cat-header-bg", color.alpha(0.12)],
          ["--cat-header-border", color.alpha(0.2)],
          ["--cat-line", color.alpha(0.35)],
          ["--cat-glow", color.alpha(0.15)],
          ["--subcat-border", color.alpha(0.35)],
          ["--path-chip-border", color.alpha(0.4)],
          ["--item-color", color.base],
          ["--item-color-strong", color.alpha(0.9)],
        ];
        return vars.map(([key, value]) => `${key}: ${value}`).join("; ");
      };

      let subcatIdCounter = 0;
      const buildSubCategoryHtml = (tab, cat, sub, items) => {
        const key = subcatKeyFor(tab, cat, sub);
        const isCollapsed = collapsedSubcats.has(key);
        const listId = `subcat-${subcatIdCounter++}`;
        return `
          <div class="space-y-0">
            <div class="flex items-center gap-1">
              <button class="subcat-toggle flex flex-1 items-center gap-2 px-2 py-2 text-left"
                      data-subcat-toggle="${toHtml(key)}"
                      aria-expanded="${(!isCollapsed).toString()}"
                      aria-controls="${listId}">
                <span class="subcat-line"></span>
                <span class="text-md font-semibold tracking-wide" style="color: var(--text-heading);">
                  ${toHtml(sub)}
                </span>
              </button>
              <button type="button" class="add-inline-btn"
                      data-add-path
                      data-add-tab="${toHtml(tab)}"
                      data-add-category="${toHtml(cat)}"
                      data-add-sub-category="${toHtml(sub)}"
                      title="${toHtml(sub)}にパスを追加"
                      aria-label="${toHtml(sub)}にパスを追加">＋</button>
            </div>
            <ul id="${listId}" class="subcat-list space-y-0.5 pl-5 ml-3 ${isCollapsed ? "hidden" : ""}">
              ${items.length
                ? items.map(buildListRow).join("")
                : `<li class="px-2 py-2 text-sm" style="color: var(--text-muted);">このサブカテゴリにはパスがありません</li>`}
            </ul>
          </div>
        `;
      };

      // カテゴリカード単位のHTML生成
      const buildCategoryCardHtml = (cat, subMap) => {
        const color = colorForCat(cat);
        const subLabels = Object.keys(subMap);
        return `
          <div class="cat-card rounded-xl border shadow-lg overflow-hidden" style="${buildCategoryStyleVars(color)}">
            <div class="cat-card__header relative px-4 py-1.5 grid grid-cols-[18px_1fr_auto] items-center gap-3 border-b">
              <span class="cat-card__topline absolute left-0 top-0 h-px w-full"></span>
              <span class="cat-card__pill inline-block h-1 w-5 rounded-full"></span>
              <div class="text-lg font-semibold leading-tight" style="color: var(--text-heading);">${toHtml(cat)}</div>
              <button type="button" class="add-inline-btn"
                      data-add-group="subCategory"
                      data-add-tab="${toHtml(state.tab)}"
                      data-add-category="${toHtml(cat)}"
                      title="${toHtml(cat)}にサブカテゴリを追加"
                      aria-label="${toHtml(cat)}にサブカテゴリを追加">＋</button>
            </div>
            <div class="p-3 space-y-3">
              ${subLabels.length
                ? subLabels.map(sub => buildSubCategoryHtml(state.tab, cat, sub, subMap[sub])).join("")
                : `<p class="px-2 py-3 text-sm" style="color: var(--text-muted);">このカテゴリにはサブカテゴリがありません</p>`}
            </div>
          </div>
        `;
      };

      const buildCompactMainHtml = (items) => {
        const rows = items.map((item) => `
          <li class="compact-row"
              data-copy="${toHtml(item.path)}"
              data-note="${toHtml(item.note || "")}">
            <span class="compact-tag compact-tag--category">${toHtml(item.category)}</span>
            <span class="compact-tag">${toHtml(item.subCategory)}</span>
            <span class="compact-name">${toHtml(formatDisplayName(item.name))}</span>
            <span class="compact-path">${toHtml(item.path)}</span>
            <span class="compact-note">${item.note ? "i" : ""}</span>
          </li>
        `).join("");

        return {
          html: `
            <div class="compact-list">
              <div class="compact-head">
                <span>カテゴリ</span>
                <span>分類</span>
                <span>名前</span>
                <span>パス</span>
                <span></span>
              </div>
              <ul>${rows}</ul>
            </div>
          `,
          isEmpty: items.length === 0
        };
      };

      // メイン領域のHTML生成
      const buildMainHtml = (items) => {
        if (document.documentElement.dataset.theme === "compact") {
          return buildCompactMainHtml(items);
        }
        const categories = state.cat ? [state.cat] : getCats();
        if (categories.length === 0) {
          return { html: "", isEmpty: true };
        }

        subcatIdCounter = 0;
        const catMap = groupByCategory(items, categories);
        const catLabels = Object.keys(catMap);
        const html = catLabels.map(cat => buildCategoryCardHtml(cat, catMap[cat])).join("");

        return { html, isEmpty: false };
      };

      const applyMain = ({ html, isEmpty }) => {
        const list = $("list");
        const empty = $("empty");
        if (!list || !empty) return;

        if (isEmpty) {
          list.innerHTML = "";
          const message = $("emptyMessage");
          if (message) {
            message.textContent = state.tab
              ? "このタブにはカテゴリがありません。ヘッダーの「追加」から作成できます。"
              : "タブがありません。ヘッダーの「追加」から作成できます。";
          }
          empty.classList.remove("hidden");
          return;
        }
        empty.classList.add("hidden");
        list.innerHTML = html;
      };

      // メインの一覧描画
      const renderMain = () => {
        const items = getFilteredItems();
        applyMain(buildMainHtml(items));
      };

      // まとめて再描画（状態変更後に呼ぶ）
      const renderAll = () => {
        renderTabList();
        renderCategoryList();
        renderMain();
        const categoryMenuItem = document.querySelector('[data-add-action="category"]');
        if (categoryMenuItem) categoryMenuItem.disabled = !state.tab;
        const categoryHint = $("addCategoryMenuHint");
        if (categoryHint) categoryHint.textContent = state.tab ? `「${state.tab}」へ追加` : "タブがありません";
      };

      const findOrCreateBlock = (blocks, label) => {
        let block = blocks.find((entry) => Array.isArray(entry) && entry[0] === label);
        if (!block) {
          block = [label, []];
          blocks.push(block);
        }
        if (!Array.isArray(block[1])) block[1] = [];
        return block;
      };

      const appendCatalogItem = ({ tab, category, subCategory, name, path, note }) => {
        const tabBlock = findOrCreateBlock(catalog, tab);
        const categoryBlock = findOrCreateBlock(tabBlock[1], category);
        const subCategoryBlock = findOrCreateBlock(categoryBlock[1], subCategory);
        subCategoryBlock[1].push([name, path, note]);
      };

      const addTab = (name) => {
        catalog.push([name, []]);
      };

      const addCategory = (tab, name) => {
        const tabBlock = findOrCreateBlock(catalog, tab);
        tabBlock[1].push([name, []]);
      };

      const addSubCategory = (tab, category, name) => {
        const tabBlock = findOrCreateBlock(catalog, tab);
        const categoryBlock = findOrCreateBlock(tabBlock[1], category);
        categoryBlock[1].push([name, []]);
      };

      const refreshCatalog = ({ tab = state.tab, cat = state.cat } = {}) => {
        normalizedCatalog = normalizeCatalog(catalog);
        warnings = normalizedCatalog.warnings;
        state.all = normalize(normalizedCatalog.items);
        const tabs = getTabs();
        state.tab = tabs.includes(tab) ? tab : (tabs[0] || "");
        const cats = getCats();
        state.cat = cats.includes(cat) ? cat : "";
        renderAll();
        renderWarnings(warnings);
      };

      let addGroupMode = "";
      let addGroupContext = {};
      const openAddGroupDialog = (mode, context = {}) => {
        if (mode === "category" && !state.tab) return;
        addGroupMode = mode;
        addGroupContext = context;
        $("addGroupForm")?.reset();
        $("addGroupError")?.classList.add("hidden");
        const isTab = mode === "tab";
        const isCategory = mode === "category";
        $("addGroupTitle").textContent = isTab ? "タブを追加" : isCategory ? "カテゴリを追加" : "サブカテゴリを追加";
        $("addGroupDescription").textContent = isTab
          ? "新しいタブ名を入力します。"
          : isCategory
            ? `「${state.tab}」にカテゴリを追加します。`
            : `「${context.category}」にサブカテゴリを追加します。`;
        $("addGroupDialog")?.showModal();
        $("addGroupName")?.focus();
      };

      const showAddGroupError = (message) => {
        const error = $("addGroupError");
        if (!error) return;
        error.textContent = message;
        error.classList.remove("hidden");
      };

      const onAddGroupSubmit = (event) => {
        event.preventDefault();
        const name = $("addGroupName")?.value.trim() || "";
        if (!name) {
          showAddGroupError("名前を入力してください。");
          return;
        }
        if (addGroupMode === "tab" && getTabs().includes(name)) {
          showAddGroupError("同じ名前のタブがすでにあります。");
          return;
        }
        if (addGroupMode === "category" && getCats().includes(name)) {
          showAddGroupError("同じ名前のカテゴリがすでにあります。");
          return;
        }
        if (
          addGroupMode === "subCategory"
          && getSubCategoryBlocks(addGroupContext.tab, addGroupContext.category)
            .some((block) => toSafeString(block[0]).trim() === name)
        ) {
          showAddGroupError("同じ名前のサブカテゴリがすでにあります。");
          return;
        }

        const previousCatalog = cloneCatalog(catalog);
        if (addGroupMode === "tab") addTab(name);
        else if (addGroupMode === "category") addCategory(state.tab, name);
        else if (addGroupMode === "subCategory") {
          addSubCategory(addGroupContext.tab, addGroupContext.category, name);
        }
        else return;

        try {
          saveCatalog(catalog);
        } catch (e) {
          catalog = previousCatalog;
          showAddGroupError("ローカルストレージに保存できませんでした。");
          return;
        }

        const nextState = addGroupMode === "tab"
          ? { tab: name, cat: "" }
          : addGroupMode === "category"
            ? { tab: state.tab, cat: name }
            : { tab: addGroupContext.tab, cat: addGroupContext.category };
        $("addGroupDialog")?.close();
        refreshCatalog(nextState);
      };

      const onOpenAddGroupClick = (event) => {
        const button = event.target.closest("[data-add-group]");
        if (!button || button.disabled) return;
        openAddGroupDialog(button.dataset.addGroup || "", {
          tab: button.dataset.addTab || state.tab,
          category: button.dataset.addCategory || ""
        });
      };

      const setDatalistOptions = (id, values) => {
        const holder = $(id);
        if (!holder) return;
        holder.innerHTML = dedupe(values.filter(Boolean))
          .map((value) => `<option value="${toHtml(value)}"></option>`)
          .join("");
      };

      const refreshAddDialogOptions = () => {
        const tab = $("addTab")?.value.trim() || "";
        const category = $("addCategory")?.value.trim() || "";
        const categoryOptions = tab
          ? getCategoryBlocks(tab).map((block) => toSafeString(block[0]).trim())
          : getTabBlocks().flatMap((block) =>
            (Array.isArray(block[1]) ? block[1] : []).map((categoryBlock) => toSafeString(categoryBlock?.[0]).trim())
          );
        setDatalistOptions("tabOptions", getTabs());
        setDatalistOptions(
          "categoryOptions",
          categoryOptions
        );
        setDatalistOptions(
          "subCategoryOptions",
          tab && category
            ? getSubCategoryBlocks(tab, category).map((block) => toSafeString(block[0]).trim())
            : state.all
              .filter((item) => (!tab || item.tab === tab) && (!category || item.category === category))
              .map((item) => item.subCategory)
        );
      };

      const prepareAddDialog = (presets = {}, lockContext = false) => {
        const form = $("addPathForm");
        const dialog = $("addPathDialog");
        if (!form || !dialog) return;
        form.reset();
        $("addPathError")?.classList.add("hidden");
        const tab = toSafeString(presets.tab);
        const category = toSafeString(presets.category);
        const subCategory = toSafeString(presets.subCategory);
        $("addTab").value = tab;
        $("addCategory").value = category;
        $("addSubCategory").value = subCategory;
        ["addTab", "addCategory", "addSubCategory"].forEach((id) => {
          const field = $(id);
          const shouldLock = lockContext && Boolean(field.value);
          field.readOnly = shouldLock;
          field.classList.toggle("context-locked", shouldLock);
        });
        refreshAddDialogOptions();
        dialog.showModal();
        const firstEmptyField = ["addTab", "addCategory", "addSubCategory", "addName", "addPath"]
          .map($)
          .find((field) => field && !field.value);
        firstEmptyField?.focus();
      };

      const onAddShortcutClick = (event) => {
        const button = event.target.closest("[data-add-path]");
        if (!button) return;
        event.preventDefault();
        event.stopPropagation();
        prepareAddDialog({
          tab: button.dataset.addTab || "",
          category: button.dataset.addCategory || "",
          subCategory: button.dataset.addSubCategory || ""
        }, true);
      };

      const closeAddMenu = () => {
        $("addMenu")?.classList.add("hidden");
        $("openAddMenuButton")?.setAttribute("aria-expanded", "false");
      };

      const closeDataMenu = () => {
        $("dataMenu")?.classList.add("hidden");
        $("openDataMenuButton")?.setAttribute("aria-expanded", "false");
      };

      const closeViewMenu = () => {
        $("viewMenu")?.classList.add("hidden");
        $("openViewMenuButton")?.setAttribute("aria-expanded", "false");
      };

      const toggleAddMenu = () => {
        const menu = $("addMenu");
        const button = $("openAddMenuButton");
        if (!menu || !button) return;
        const willOpen = menu.classList.contains("hidden");
        closeDataMenu();
        closeViewMenu();
        menu.classList.toggle("hidden", !willOpen);
        button.setAttribute("aria-expanded", willOpen.toString());
      };

      const toggleDataMenu = () => {
        const menu = $("dataMenu");
        const button = $("openDataMenuButton");
        if (!menu || !button) return;
        const willOpen = menu.classList.contains("hidden");
        closeAddMenu();
        closeViewMenu();
        menu.classList.toggle("hidden", !willOpen);
        button.setAttribute("aria-expanded", willOpen.toString());
      };

      const toggleViewMenu = () => {
        const menu = $("viewMenu");
        const button = $("openViewMenuButton");
        if (!menu || !button) return;
        const willOpen = menu.classList.contains("hidden");
        closeAddMenu();
        closeDataMenu();
        menu.classList.toggle("hidden", !willOpen);
        button.setAttribute("aria-expanded", willOpen.toString());
      };

      const onAddMenuAction = (event) => {
        const button = event.target.closest("[data-add-action]");
        if (!button || button.disabled) return;
        const action = button.dataset.addAction || "";
        closeAddMenu();
        if (action === "path") prepareAddDialog();
        else if (action === "category") openAddGroupDialog("category");
        else if (action === "tab") openAddGroupDialog("tab");
      };

      const onDataMenuAction = (event) => {
        const button = event.target.closest("[data-data-action]");
        if (!button) return;
        const action = button.dataset.dataAction || "";
        closeDataMenu();
        if (action === "import") $("importDataInput")?.click();
        else if (action === "export") exportCatalogData();
      };

      const onThemeAction = (event) => {
        const button = event.target.closest("[data-theme-value]");
        if (!button) return;
        applyTheme(button.dataset.themeValue || "current");
        closeViewMenu();
        renderMain();
      };

      const onDocumentClick = (event) => {
        const addMenu = $("addMenu");
        const addButton = $("openAddMenuButton");
        if (addMenu && !addMenu.classList.contains("hidden")
          && !addMenu.contains(event.target) && !addButton?.contains(event.target)) {
          closeAddMenu();
        }
        const dataMenu = $("dataMenu");
        const dataButton = $("openDataMenuButton");
        if (dataMenu && !dataMenu.classList.contains("hidden")
          && !dataMenu.contains(event.target) && !dataButton?.contains(event.target)) {
          closeDataMenu();
        }
        const viewMenu = $("viewMenu");
        const viewButton = $("openViewMenuButton");
        if (viewMenu && !viewMenu.classList.contains("hidden")
          && !viewMenu.contains(event.target) && !viewButton?.contains(event.target)) {
          closeViewMenu();
        }
      };

      const showAddPathError = (message) => {
        const error = $("addPathError");
        if (!error) return;
        error.textContent = message;
        error.classList.remove("hidden");
      };

      const onAddPathSubmit = (event) => {
        event.preventDefault();
        const form = event.currentTarget;
        const values = Object.fromEntries(new FormData(form).entries());
        const item = {
          tab: toSafeString(values.tab).trim(),
          category: toSafeString(values.category).trim(),
          subCategory: toSafeString(values.subCategory).trim(),
          name: toSafeString(values.name).trim(),
          path: toSafeString(values.path).trim(),
          note: toSafeString(values.note)
        };
        if (!item.tab || !item.category || !item.subCategory || !item.name || !item.path) {
          showAddPathError("必須項目を入力してください。");
          return;
        }

        appendCatalogItem(item);
        try {
          saveCatalog(catalog);
        } catch (e) {
          catalog = loadCatalog().catalog;
          showAddPathError("ローカルストレージに保存できませんでした。");
          return;
        }

        refreshCatalog({ tab: item.tab, cat: item.category });
        $("addPathDialog")?.close();
        showInlineToast($("openAddMenuButton")?.parentElement, "保存しました");
      };

      const DATA_FILE_PREFIX = [
        "// パスノート data",
        "// ブラウザからの登録・読み込み・書き出しを推奨します。",
        ""
      ].join("\n");

      const buildDataJs = (value) =>
        `${DATA_FILE_PREFIX}window.PATH_CATALOG = ${JSON.stringify(value, null, 2)};\n`;

      const exportCatalogData = () => {
        const blob = new Blob([buildDataJs(catalog)], { type: "text/javascript;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "data.js";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showInlineToast($("openDataMenuButton")?.parentElement, "書き出しました");
      };

      const validateCatalogData = (value) => {
        if (!Array.isArray(value)) throw new Error("カタログ全体が配列ではありません。");
        value.forEach((tabBlock, t) => {
          if (!Array.isArray(tabBlock) || tabBlock.length !== 2 || typeof tabBlock[0] !== "string" || !tabBlock[0].trim()) {
            throw new Error(`タブ ${t + 1} の形式が不正です。`);
          }
          if (!Array.isArray(tabBlock[1])) throw new Error(`タブ「${tabBlock[0]}」のカテゴリが配列ではありません。`);
          tabBlock[1].forEach((categoryBlock, c) => {
            if (!Array.isArray(categoryBlock) || categoryBlock.length !== 2 || typeof categoryBlock[0] !== "string" || !categoryBlock[0].trim()) {
              throw new Error(`タブ「${tabBlock[0]}」のカテゴリ ${c + 1} の形式が不正です。`);
            }
            if (!Array.isArray(categoryBlock[1])) throw new Error(`カテゴリ「${categoryBlock[0]}」のサブカテゴリが配列ではありません。`);
            categoryBlock[1].forEach((subBlock, s) => {
              if (!Array.isArray(subBlock) || subBlock.length !== 2 || typeof subBlock[0] !== "string" || !subBlock[0].trim()) {
                throw new Error(`カテゴリ「${categoryBlock[0]}」のサブカテゴリ ${s + 1} の形式が不正です。`);
              }
              if (!Array.isArray(subBlock[1])) throw new Error(`サブカテゴリ「${subBlock[0]}」のパスが配列ではありません。`);
              subBlock[1].forEach((row, i) => {
                if (!Array.isArray(row) || row.length !== 3 || row.some((cell) => typeof cell !== "string")) {
                  throw new Error(`サブカテゴリ「${subBlock[0]}」のパス ${i + 1} の形式が不正です。`);
                }
                if (!row[0].trim() || !row[1].trim()) {
                  throw new Error(`サブカテゴリ「${subBlock[0]}」のパス ${i + 1} に必須項目がありません。`);
                }
              });
            });
          });
        });
        return value;
      };

      const parseDataJs = (text) => {
        const match = text.match(
          /^\uFEFF?(?:\s*\/\/[^\r\n]*(?:\r?\n|$))*\s*window\.PATH_CATALOG\s*=\s*([\s\S]*?)\s*;\s*$/
        );
        if (!match) {
          throw new Error("パスノートから書き出したJSON互換形式のdata.jsではありません。");
        }
        return validateCatalogData(JSON.parse(match[1]));
      };

      const importCatalogData = async (file) => {
        if (!file) return;
        try {
          const imported = parseDataJs(await file.text());
          const importedItems = normalizeCatalog(imported).items.length;
          const confirmed = window.confirm(
            `${file.name}を読み込み、現在のデータを置き換えます。\n`
            + `タブ: ${imported.length}件 / パス: ${importedItems}件\n\n続行しますか？`
          );
          if (!confirmed) return;
          saveCatalog(imported);
          catalog = cloneCatalog(imported);
          refreshCatalog({ tab: "", cat: "" });
          showInlineToast($("openDataMenuButton")?.parentElement, "読み込みました");
        } catch (e) {
          window.alert(`データを読み込めませんでした。\n${e.message || e}`);
        } finally {
          const input = $("importDataInput");
          if (input) input.value = "";
        }
      };

      // カード上に短時間出すミニトースト
      const showInlineToast = (parent, msg) => {
        if (!parent) return;
        const tag = document.createElement("span");
        tag.className = "toast-surface absolute right-2 top-1/2 -translate-y-1/2 transform rounded-full text-xs px-2 py-0.5 border shadow";
        tag.style.color = "var(--text-heading)";
        tag.textContent = msg;
        parent.appendChild(tag);
        setTimeout(() => tag.remove(), 900);
      };

      // クリップボードコピー + インライン表示
      const fallbackCopyText = (text) => {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        const copied = document.execCommand("copy");
        ta.remove();
        return copied;
      };

      const copyTextToClipboard = async (text, targetEl) => {
        let copied = false;
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
            copied = true;
          }
        } catch (e) {
          copied = false;
        }
        if (!copied) {
          try {
            copied = fallbackCopyText(text);
          } catch (e) {
            copied = false;
          }
        }
        showInlineToast(targetEl, copied ? "コピーしました" : "コピーできませんでした");
      };

      // ノート用ツールチップ（行外に出すため body 直下に生成）
      const noteTooltip = (() => {
        const el = document.createElement("div");
        el.id = "note-tooltip";
        el.style.position = "fixed";
        el.style.zIndex = "9999";
        el.style.pointerEvents = "none";
        el.style.opacity = "0";
        el.style.transition = "opacity 120ms ease, transform 120ms ease";
        el.className = "toast-surface max-w-md whitespace-pre-line rounded-md border px-3 py-2 text-xs shadow-lg";
        el.style.color = "var(--text-heading)";
        document.body.appendChild(el);
        return {
          show(text, x, y) {
            el.textContent = text;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.opacity = "1";
            el.style.transform = "translate(-8px, 6px)";
          },
          hide() {
            el.style.opacity = "0";
          }
        };
      })();

      // 状態変更はここに集約
      const actions = {
        setTab: (tab) => {
          if (tab === state.tab) return;
          state.tab = tab;
          state.cat = "";
          activeNoteRow = null;
          noteTooltip.hide();
          renderAll();
        },
        setCat: (cat) => {
          const cats = getCats();
          state.cat = cats.includes(cat) ? cat : "";
          activeNoteRow = null;
          noteTooltip.hide();
          renderAll();
        },
      };

      const isEditableTarget = (target) => {
        if (!target) return false;
        if (target.isContentEditable) return true;
        const tag = target.tagName;
        return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";
      };

      const getSteppedItem = (list, current, delta) => {
        if (list.length === 0) return current;
        const index = list.indexOf(current);
        const safeIndex = index === -1 ? 0 : index;
        const next = (safeIndex + delta + list.length) % list.length;
        return list[next];
      };

      // キー操作（左右でタブ、上下でカテゴリ）
      const onKeydown = (event) => {
        if (isEditableTarget(event.target)) return;
        if (event.ctrlKey || event.metaKey || event.altKey) return;

        if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
          const tabs = getTabs();
          if (!tabs.length) return;
          const delta = event.key === "ArrowRight" ? 1 : -1;
          actions.setTab(getSteppedItem(tabs, state.tab, delta));
          event.preventDefault();
          return;
        }

        if (event.key === "ArrowUp" || event.key === "ArrowDown") {
          const cats = [""].concat(getCats());
          if (!cats.length) return;
          const delta = event.key === "ArrowDown" ? 1 : -1;
          actions.setCat(getSteppedItem(cats, state.cat, delta));
          event.preventDefault();
        }
      };

      // イベント委譲: タブ切り替え
      const onTabClick = (event) => {
        const btn = event.target.closest("button[data-tab]");
        if (!btn) return;
        actions.setTab(btn.getAttribute("data-tab") || "");
      };

      // イベント委譲: カテゴリ切り替え
      const onCatClick = (event) => {
        const btn = event.target.closest("button[data-cat]");
        if (!btn) return;
        actions.setCat(btn.getAttribute("data-cat") || "");
      };

      // イベント委譲: クリックでコピー
      const onListClick = async (event) => {
        const row = event.target.closest("li[data-copy]");
        if (!row) return;
        const p = row.getAttribute("data-copy") || "";
        await copyTextToClipboard(p, row);
      };

      // イベント委譲: サブカテゴリの折りたたみ
      const onSubcatToggle = (event) => {
        const btn = event.target.closest("[data-subcat-toggle]");
        if (!btn) return;
        const key = btn.getAttribute("data-subcat-toggle") || "";
        const list = btn.parentElement?.nextElementSibling;
        if (!list || !list.classList.contains("subcat-list")) return;
        const willCollapse = !list.classList.contains("hidden");
        list.classList.toggle("hidden");
        btn.setAttribute("aria-expanded", (!willCollapse).toString());
        if (key) {
          if (willCollapse) collapsedSubcats.add(key);
          else collapsedSubcats.delete(key);
          saveCollapsedSubcats(collapsedSubcats);
        }
      };

      // ノート表示のマウスイベント群
      const onNoteOver = (event) => {
        const row = event.target.closest("li[data-note]");
        if (!row) return;
        const note = row.getAttribute("data-note") || "";
        if (!note || activeNoteRow === row) return;
        activeNoteRow = row;
        const rect = row.getBoundingClientRect();
        noteTooltip.show(note, rect.right + 36, rect.bottom);
      };

      const onNoteMove = (event) => {
        if (!activeNoteRow) return;
        const note = activeNoteRow.getAttribute("data-note") || "";
        if (!note) return;
        noteTooltip.show(note, event.clientX + 36, event.clientY);
      };

      const onNoteOut = (event) => {
        const row = event.target.closest("li[data-note]");
        if (!row || !activeNoteRow) return;
        if (row.contains(event.relatedTarget)) return;
        activeNoteRow = null;
        noteTooltip.hide();
      };

      const onListLeave = () => {
        if (!activeNoteRow) return;
        activeNoteRow = null;
        noteTooltip.hide();
      };

      // 1回だけイベント登録
      const bind = () => {
        const tabNav = $("tabNav");
        const catList = $("catList");
        const list = $("list");
        const addPathForm = $("addPathForm");
        const addPathDialog = $("addPathDialog");
        const addGroupForm = $("addGroupForm");
        const addGroupDialog = $("addGroupDialog");

        if (tabNav) tabNav.addEventListener("click", onTabClick);
        if (catList) catList.addEventListener("click", onCatClick);
        $("openAddMenuButton")?.addEventListener("click", toggleAddMenu);
        $("addMenu")?.addEventListener("click", onAddMenuAction);
        $("openViewMenuButton")?.addEventListener("click", toggleViewMenu);
        $("viewMenu")?.addEventListener("click", onThemeAction);
        $("openDataMenuButton")?.addEventListener("click", toggleDataMenu);
        $("dataMenu")?.addEventListener("click", onDataMenuAction);
        $("importDataInput")?.addEventListener("change", (event) => importCatalogData(event.target.files?.[0]));
        $("cancelAddPathButton")?.addEventListener("click", () => addPathDialog?.close());
        $("cancelAddGroupButton")?.addEventListener("click", () => addGroupDialog?.close());
        $("addTab")?.addEventListener("input", refreshAddDialogOptions);
        $("addCategory")?.addEventListener("input", refreshAddDialogOptions);
        if (addPathForm) addPathForm.addEventListener("submit", onAddPathSubmit);
        if (addGroupForm) addGroupForm.addEventListener("submit", onAddGroupSubmit);
        document.addEventListener("keydown", onKeydown);
        document.addEventListener("click", onDocumentClick);
        if (list) {
          list.addEventListener("click", onAddShortcutClick);
          list.addEventListener("click", onOpenAddGroupClick);
          list.addEventListener("click", onSubcatToggle);
          list.addEventListener("click", onListClick);
          list.addEventListener("mouseover", onNoteOver);
          list.addEventListener("mousemove", onNoteMove);
          list.addEventListener("mouseout", onNoteOut);
          list.addEventListener("mouseleave", onListLeave);
        }
      };

      // 初期化エントリポイント
      const init = () => {
        applyTheme(loadTheme(), { persist: false });
        bind();
        renderAll();
        renderWarnings(warnings);
      };

      const App = { init };
      App.init();
    })();
  </script>
</body>

</html>
