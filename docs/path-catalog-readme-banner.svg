<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Path Catalog</title>
  <desc id="desc">よく使うパスを、見つけやすく。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="960" cy="40" r="210" fill="#7c3aed" opacity=".16" filter="url(#glow)"/>
  <circle cx="1140" cy="300" r="160" fill="#2563eb" opacity=".1" filter="url(#glow)"/>

  <g transform="translate(86 90)">
    <rect width="180" height="180" rx="52" fill="url(#accent)"/>
    <path d="M40 126 78 62" fill="none" stroke="#f8fafc" stroke-width="17" stroke-linecap="round"/>
    <rect x="101" y="56" width="62" height="62" rx="10" fill="#e2e8f0" opacity=".55"/>
    <rect x="85" y="72" width="62" height="62" rx="10" fill="#f8fafc"/>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="320" y="145" fill="#f8fafc" font-size="72" font-weight="750" letter-spacing="-2">Path Catalog</text>
    <text x="324" y="205" fill="#cbd5e1" font-size="27" font-weight="500">よく使うパスを、見つけやすく。</text>

    <g transform="translate(322 244)" font-size="17" font-weight="600">
      <rect width="156" height="42" rx="21" fill="#7c3aed" opacity=".18" stroke="#8b5cf6" stroke-opacity=".65"/>
      <text x="78" y="27" fill="#ddd6fe" text-anchor="middle">クリックでコピー</text>

      <rect x="170" width="142" height="42" rx="21" fill="#2563eb" opacity=".15" stroke="#3b82f6" stroke-opacity=".55"/>
      <text x="241" y="27" fill="#bfdbfe" text-anchor="middle">ブラウザで登録</text>

      <rect x="326" width="168" height="42" rx="21" fill="#0f766e" opacity=".18" stroke="#14b8a6" stroke-opacity=".55"/>
      <text x="410" y="27" fill="#99f6e4" text-anchor="middle">インストール不要</text>
    </g>
  </g>
</svg>
