<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ここかな。</title>
  <desc id="desc">散らかったパスから、探していた場所へ。</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#171426"/>
      <stop offset="1" stop-color="#292344"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#443d70"/>
      <stop offset="1" stop-color="#201c38"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".32"/>
    </filter>
    <clipPath id="iconClip">
      <rect width="180" height="180" rx="42"/>
    </clipPath>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#page)"/>
  <g transform="translate(82 90)" filter="url(#shadow)" clip-path="url(#iconClip)">
    <rect width="180" height="180" rx="42" fill="url(#icon)"/>
    <g font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="10" font-weight="700" fill="#aaa3bd">
      <text x="-4" y="28">../old/src</text>
      <text x="132" y="42">~/tmp</text>
      <text x="-4" y="76">C:\work</text>
      <text x="139" y="84">/assets</text>
      <text x="-3" y="160">~/archive</text>
      <text x="143" y="148">../docs</text>
    </g>
    <rect x="36" y="94" width="128" height="30" rx="7" fill="#c6a765"/>
    <text x="46" y="114" fill="#4c3f40" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12" font-weight="700">/src/data.js</text>
  </g>

  <g font-family="'Noto Sans JP', ui-sans-serif, system-ui, sans-serif">
    <text x="320" y="150" fill="#f8fafc" font-size="72" font-weight="800" letter-spacing="-3">ここかな。</text>
    <text x="324" y="205" fill="#cbd5e1" font-size="25" font-weight="500">散らかったパスから、探していた場所へ。</text>
    <g transform="translate(324 242)" font-size="16" font-weight="600">
      <text x="0" y="25" fill="#c6a765">ブラウザで登録</text>
      <text x="132" y="25" fill="#6b648a">/</text>
      <text x="155" y="25" fill="#cbd5e1">クリックでコピー</text>
      <text x="300" y="25" fill="#6b648a">/</text>
      <text x="323" y="25" fill="#cbd5e1">data.jsで持ち運ぶ</text>
    </g>
  </g>
</svg>
